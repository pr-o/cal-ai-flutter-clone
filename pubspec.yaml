name: cal_ai_flutter_clone
description: "A Flutter clone of Cal AI — AI-powered calorie tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Local database
  drift: ^2.22.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  flutter_dotenv: ^5.2.1

  # Camera
  camera: ^0.11.0

  # Networking
  http: ^1.2.0

  # Charts
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^3.0.0
  timezone: ^0.10.0

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.4.0
  google_fonts: ^6.2.0
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.0
  drift_dev: ^2.22.0
  riverpod_generator: ^3.0.0

  # Testing
  mocktail: ^1.0.0
  flutter_secure_storage_platform_interface: ^1.1.2

flutter:
  uses-material-design: true
  assets:
    - .env
